<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">

  <meta property="og:title" content="Baju Viral Cewek yang Lagi Banyak Dicari">
  <meta property="og:description" content="Katanya bahan adem dan fit-nya bagus banget">
  <meta property="og:image" content="https://raw.githubusercontent.com/minokun400-arch/cekbarang/main/bajuoversize.jpg">
  <meta property="og:type" content="website">

  <meta http-equiv="refresh" content="10;url=https://s.shopee.co.id/5L8xnjm8jO">

  <title>Baju Viral</title>

  <style>

    body{
      margin:0;
      padding:0;
      background:#f5f5f5;
      font-family:Arial,sans-serif;
    }

    .container{
      max-width:600px;
      margin:auto;
      background:white;
      min-height:100vh;
    }

    img{
      width:100%;
      display:block;
    }

    .content{
      padding:20px;
    }

    h1{
      font-size:28px;
      line-height:1.3;
      margin-bottom:15px;
    }

    p{
      color:#444;
      line-height:1.7;
      font-size:17px;
    }

    .loading{
      margin-top:25px;
      color:#888;
      font-size:14px;
    }

    .bar{
      width:100%;
      height:8px;
      background:#ddd;
      border-radius:10px;
      overflow:hidden;
      margin-top:10px;
    }

    .fill{
      width:0%;
      height:100%;
      background:#111;
      animation:load 6s linear forwards;
    }

    @keyframes load{
      from{
        width:0%;
      }

      to{
        width:100%;
      }
    }

  </style>
</head>

<body>

<div class="container">

  <img src="https://raw.githubusercontent.com/minokun400-arch/cekbarang/main/bajuoversize.jpg">

  <div class="content">

    <h1>
      Cewek-Cewek Lagi Cari Model Baju Ini 😭
    </h1>

    <p>
      Awalnya kirain biasa aja, ternyata pas dipakai fit-nya bagus banget dan keliatan clean.
      Bahannya juga katanya adem dipakai harian.
    </p>

    <p>
      Tidak heran kalau model ini mulai sering muncul di Threads dan TikTok.
    </p>

    <div class="loading">
      Membuka detail produk...
      <div class="bar">
        <div class="fill"></div>
      </div>
    </div>

  </div>

</div>

</body>
</html>
